seed: 42
output_dir: /content/drive/MyDrive/IMPERIAL/bs_jepa/

data:
  # Use "synthetic", a subject dictionary (.pkl/.pt), or a directory of .pt/.npz files.
  source: /content/drive/MyDrive/IMPERIAL/data/subject_data_1_cleaned_precise_age.pkl
  atlas_csv: /content/drive/MyDrive/IMPERIAL/data/glasser379_to_rsn12.csv
  num_subjects: 16
  num_regions: 40
  num_rsns: 8
  node_features: bold
  feature_dim: 32
  bold_key: BOLD
  fc_key: FC
  transpose_bold: false
  graph_strategy: top_k
  top_k: 8
  threshold: 0.2
  batch_size: 16
  num_workers: 0

masking:
  num_targets: 10

model:
  embed_dim: 64
  feature_mode: conv1d
  feature_dim: 32
  encoder_type: gat
  encoder_hidden: 64
  encoder_layers: 1
  encoder_heads: 4
  encoder_dropout: 0.1
  predictor_type: gat
  predictor_hidden: 8
  predictor_layers: 1
  predictor_heads: 2
  predictor_dropout: 0.0
  region_positional_encoding: true

training:
  epochs: 100
  lr: 0.0001
  start_lr: 0.000001
  final_lr: 0.000001
  warmup_epochs: 0
  weight_decay_start: 0.01
  weight_decay_end: 0.05
  ema_start: 0.999
  ema_end: 1.0
  clip_grad: 1.0
  prediction_variance_weight: 0.5
  context_variance_weight: 1.0
  covariance_weight: 0.1
  target_std: 0.1
  rsn_diversity_weight: 0.05
  checkpoint_frequency: 1
  save_plots: true
  plot_frequency: 1
  collapse_metrics: true

evaluation:
  enabled: true
  pmat_csv: /Users/stefanovannoni/Desktop/IMPERIAL COLLEGE/Data/data/hcp_ya_dataset/HCP_YA_subjects_2026_04_02_12_52_45.csv
  label_column: PMAT24_A_CR
  subject_column: Subject
  heldout_size: 64
  frequency_epochs: 5
  regressor_epochs: 100
  regressor_lr: 0.001
  batch_size: 32
  validation_fraction: 0.25
  random_seed: 42
