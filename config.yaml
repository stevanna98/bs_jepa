seed: 42
# output_dir: /content/drive/MyDrive/IMPERIAL/bs_jepa/
output_dir: /content/drive/MyDrive/IMPERIAL/IMPERIAL/bs_jepa/

data:
  # Use "synthetic", a subject dictionary (.pkl/.pt), or a directory of .pt/.npz files.
  # source: /content/drive/MyDrive/IMPERIAL/data/subject_data_1_cleaned_precise_age.pkl
  source: /content/drive/MyDrive/IMPERIAL/IMPERIAL/data/subject_data_1_cleaned_precise_age.pkl
  atlas_csv: /content/drive/MyDrive/IMPERIAL/IMPERIAL/data/glasser379_to_rsn12.csv
  num_subjects: 16
  num_regions: 40
  num_rsns: 8
  node_features: bold
  feature_dim: 32
  bold_key: BOLD
  fc_key: FC
  transpose_bold: false
  # Set bold_window_size to an integer k to use one BOLD window of k time points
  # as node features while still constructing the graph from the full BOLD/FC.
  bold_window_size:
  bold_window_start: 0
  # Options: dense, top_k, absolute_threshold, positive_proportional.
  # For positive_proportional, threshold is the retained fraction of positive edges.
  graph_strategy: positive_proportional
  top_k: 8
  threshold: 0.1
  batch_size: 16
  num_workers: 0

masking:
  num_targets: 2

model:
  embed_dim: 128
  feature_mode: passthrough
  feature_dim: 256
  # Preserve this many coarse windows instead of globally pooling the time axis.
  temporal_pool_bins: 8
  # Options: gcn, gat, graphsage, transformer, gine.
  encoder_type: gat
  encoder_hidden: 128
  encoder_layers: 2
  encoder_heads: 4
  encoder_dropout: 0.1
  # Options: gcn, gat, graphsage, transformer, gine.
  predictor_type: gat
  predictor_hidden: 64
  predictor_layers: 2
  predictor_heads: 2
  predictor_dropout: 0.1
  region_positional_encoding: false
  # Options: shared, random_per_target_node, rsn_specific, zero.
  mask_token_mode: shared
  random_mask_token_std: 0.02

training:
  epochs: 50
  lr: 0.001
  start_lr: 0.000001
  final_lr: 0.000001
  warmup_epochs: 0
  weight_decay_start: 0.01
  weight_decay_end: 0.05
  ema_start: 0.996
  ema_end: 1.0
  clip_grad: 1.0
  prediction_variance_weight: 0.5
  context_variance_weight: 1.0
  covariance_weight: 0.1
  target_std: 0.1
  rsn_diversity_weight: 0.05
  checkpoint_frequency: 1
  save_plots: true
  plot_frequency: 1
  subject_similarity_diagnostics: true
  subject_extended_diagnostics: true
  subject_embedding_batch_size: 32
  subject_similarity_max_ticks: 40
  subject_similarity_histogram_bins: 30
  subject_centered_cosine_epsilon: 1.0e-12
  subject_near_zero_variance_threshold: 1.0e-8
  subject_standardization_epsilon: 1.0e-6
  region_stage_diagnostics: true
  region_stage_diagnostics_frequency: 1
  region_stage_diagnostics_batch_size: 32
  region_stage_near_zero_threshold: 1.0e-8
  region_stage_norm_epsilon: 1.0e-12
  region_network_diagnostics: true
  region_network_diagnostics_frequency: 5
  region_network_diagnostics_batch_size: 32
  collapse_metrics: true
  save_final_artifact: true
  artifact_name:
  publication_plot_dpi: 300
  save_plot_pdf: true

evaluation:
  enabled: false
  pmat_csv: /content/drive/MyDrive/IMPERIAL/data/HCP_YA_subjects_2026_04_02_12_52_45.csv
  label_column: PMAT24_A_CR
  subject_column: Subject
  heldout_size: 64
  frequency_epochs: 5
  regressor_epochs: 100
  regressor_lr: 0.001
  batch_size: 32
  validation_fraction: 0.25
  random_seed: 42

linear_probe:
  enabled: true
  compare_baselines: true
  task: gender
  metadata_key: gender
  family_key: Family_ID
  heldout_size: 128
  eval_frequency_epochs: 5
  probe_train_fraction: 0.7
  probe_epochs: 100
  probe_lr: 0.001
  probe_weight_decay: 0.0
  batch_size: 32
  random_seed: 42
  embedding_preprocessing:
    # Default preserves previous behavior. Add centered, standardized,
    # centered_pc_removed, and standardized_pc_removed to run ablations.
    variants:
      - raw
    pc_remove_components:
      - 1
      - 2
      - 5
      - 10
    standardize_epsilon: 1.0e-6
